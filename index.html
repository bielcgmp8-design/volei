<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorteio Vôlei Mobile</title>
    <style>
        /* Cores e Reset */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5; 
            margin: 0; 
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .box { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px;
        }

        h2 { color: #004e89; text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        
        label { 
            display: block; 
            margin: 12px 0 6px; 
            font-weight: 600; 
            color: #333;
            font-size: 0.95rem;
        }

        /* Ajustes para Inputs no Celular */
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px; /* Evita zoom automático no iPhone */
            background: #fafafa;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #ff6b35;
            outline: none;
            background: #fff;
        }

        textarea { height: 100px; line-height: 1.4; }

        .captains-area { 
            background: #f8faff; 
            padding: 12px; 
            border-radius: 10px; 
            border: 2px dashed #004e89; 
            margin-bottom: 10px;
        }

        .captain-input { margin-bottom: 10px; }

        /* Botões Estilo Mobile */
        button { 
            width: 100%; 
            padding: 15px; 
            margin-top: 15px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            active: transform: scale(0.98);
        }

        .btn-sortear { background: #ff6b35; color: white; }
        .btn-voltar { background: #6c757d; color: white; margin-top: 10px; }

        /* Resultado das Equipes */
        .team { 
            background: #fff; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px;
            border: 1px solid #eee;
            border-top: 5px solid #ff6b35;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .team strong { color: #004e89; font-size: 1.2rem; display: block; margin-bottom: 8px; }
        .player-item { padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
        .player-item:last-child { border-bottom: none; }
        
        .captain-tag { 
            background: #d9534f; 
            color: white; 
            font-size: 10px; 
            padding: 2px 6px; 
            border-radius: 4px; 
            margin-left: 5px;
            vertical-align: middle;
        }

        #results { display: none; }
    </style>
</head>
<body>

<div class="box" id="setup">
    <h2>🏐 Sorteio de Vôlei</h2>
    
    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Nº de Times</label>
            <input type="number" id="numTeams" value="2" min="1" oninput="gerarCamposCapitaes()">
        </div>
        <div style="flex: 1;">
            <label>Pessoas/Time</label>
            <input type="number" id="perTeam" value="6" min="2">
        </div>
    </div>

    <label>⭐ Nome dos Capitães:</label>
    <div id="captainsContainer" class="captains-area"></div>

    <label>Homens (um por linha):</label>
    <textarea id="males" placeholder="Toque para digitar os nomes..."></textarea>

    <label>Mulheres (um por linha):</label>
    <textarea id="females" placeholder="Toque para digitar os nomes..."></textarea>

    <button class="btn-sortear" onclick="sortear()">SORTEAR AGORA</button>
</div>

<div class="box" id="results">
    <h2>Equipes Formadas</h2>
    <div id="teamList"></div>
    <button class="btn-sortear" onclick="sortear()">🔄 SORTEAR NOVAMENTE</button>
    <button class="btn-voltar" onclick="voltar()">✏️ EDITAR DADOS</button>
</div>

<script>
    function gerarCamposCapitaes() {
        const n = parseInt(document.getElementById('numTeams').value) || 0;
        const container = document.getElementById('captainsContainer');
        container.innerHTML = '';
        for (let i = 1; i <= n; i++) {
            container.innerHTML += `
                <div class="captain-input">
                    <input type="text" class="cap-name" placeholder="Nome do Capitão ${i}">
                </div>`;
        }
    }

    window.onload = gerarCamposCapitaes;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function sortear() {
        const nTeams = parseInt(document.getElementById('numTeams').value);
        const pTeam = parseInt(document.getElementById('perTeam').value);
        const capInputs = document.querySelectorAll('.cap-name');
        let captains = Array.from(capInputs).map(input => input.value.trim()).filter(n => n !== "");
        let m = document.getElementById('males').value.split('\n').filter(n => n.trim() !== "");
        let f = document.getElementById('females').value.split('\n').filter(n => n.trim() !== "");

        if (captains.length < nTeams) {
            alert(`Preencha os ${nTeams} capitães!`);
            return;
        }

        const faltam = (nTeams * pTeam) - nTeams;
        if ((m.length + f.length) < faltam) {
            alert(`Faltam ${faltam - (m.length + f.length)} jogadores.`);
            return;
        }

        m = shuffle(m); f = shuffle(f);
        let teams = captains.map(cap => [cap + " <span class='captain-tag'>CAP</span>"]);

        for (let i = 1; i < pTeam; i++) {
            for (let t = 0; t < nTeams; t++) {
                let pick = (i % 2 !== 0) ? (f.length ? f.pop() : m.pop()) : (m.length ? m.pop() : f.pop());
                if (pick) teams[t].push(pick);
            }
        }

        document.getElementById('teamList').innerHTML = teams.map((t, i) => 
            `<div class="team"><strong>Time ${i+1}</strong>` + 
            t.map(p => `<div class="player-item">• ${p}</div>`).join('') + 
            `</div>`).join('');
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function voltar() {
        document.getElementById('setup').style.display = 'block';
        document.getElementById('results').style.display = 'none';
    }
</script>
</body>
</html>
