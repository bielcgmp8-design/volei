<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorteio Vôlei Mobile</title>
    <style>
        /* Cores e Reset */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5; 
            margin: 0; 
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .box { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px;
        }

        h2 { color: #004e89; text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        h3 { color: #ff6b35; margin-top: 0; font-size: 1.2rem; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        
        label { 
            display: block; 
            margin: 10px 0 4px; 
            font-weight: 600; 
            color: #333;
            font-size: 0.90rem;
        }

        /* Ajustes para Inputs no Celular */
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px; /* Evita zoom automático no iPhone */
            background: #fafafa;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #ff6b35;
            outline: none;
            background: #fff;
        }

        /* Altura reduzida pois agora são 6 caixas */
        textarea { height: 75px; line-height: 1.4; }

        .captains-area { 
            background: #f8faff; 
            padding: 12px; 
            border-radius: 10px; 
            border: 2px dashed #004e89; 
            margin-bottom: 15px;
        }

        .category-area {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .captain-input { margin-bottom: 10px; }

        /* Botões Estilo Mobile */
        button { 
            width: 100%; 
            padding: 15px; 
            margin-top: 10px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .btn-sortear { background: #ff6b35; color: white; }
        .btn-voltar { background: #6c757d; color: white; margin-top: 10px; }

        /* Resultado das Equipes */
        .team { 
            background: #fff; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px;
            border: 1px solid #eee;
            border-top: 5px solid #004e89;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .team strong { color: #004e89; font-size: 1.2rem; display: block; margin-bottom: 8px; }
        .player-item { padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
        .player-item:last-child { border-bottom: none; }
        
        .captain-tag { 
            background: #d9534f; 
            color: white; 
            font-size: 10px; 
            padding: 2px 6px; 
            border-radius: 4px; 
            margin-left: 5px;
            vertical-align: middle;
        }
        
        .level-tag {
            color: #888;
            font-size: 0.8rem;
            margin-left: 5px;
            font-style: italic;
        }

        #results { display: none; }
    </style>
</head>
<body>

<div class="box" id="setup">
    <h2>🏐 Sorteio de Vôlei</h2>
    
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <div style="flex: 1;">
            <label>Nº de Times</label>
            <input type="number" id="numTeams" value="2" min="1" oninput="gerarCamposCapitaes()">
        </div>
        <div style="flex: 1;">
            <label>Pessoas/Time</label>
            <input type="number" id="perTeam" value="6" min="2">
        </div>
    </div>

    <label>⭐ Nome dos Capitães:</label>
    <div id="captainsContainer" class="captains-area"></div>

    <div class="category-area">
        <h3>Homens</h3>
        <label>Nível 1 (Avançado):</label>
        <textarea id="m1" placeholder="Um nome por linha..."></textarea>
        
        <label>Nível 2 (Intermediário):</label>
        <textarea id="m2" placeholder="Um nome por linha..."></textarea>
        
        <label>Nível 3 (Iniciante):</label>
        <textarea id="m3" placeholder="Um nome por linha..."></textarea>
    </div>

    <div class="category-area">
        <h3>Mulheres</h3>
        <label>Nível 1 (Avançado):</label>
        <textarea id="f1" placeholder="Um nome por linha..."></textarea>
        
        <label>Nível 2 (Intermediário):</label>
        <textarea id="f2" placeholder="Um nome por linha..."></textarea>
        
        <label>Nível 3 (Iniciante):</label>
        <textarea id="f3" placeholder="Um nome por linha..."></textarea>
    </div>

    <button class="btn-sortear" onclick="sortear()">SORTEAR AGORA</button>
</div>

<div class="box" id="results">
    <h2>Equipes Formadas</h2>
    <div id="teamList"></div>
    <button class="btn-sortear" onclick="sortear()">🔄 SORTEAR NOVAMENTE</button>
    <button class="btn-voltar" onclick="voltar()">✏️ EDITAR DADOS</button>
</div>

<script>
    function gerarCamposCapitaes() {
        const n = parseInt(document.getElementById('numTeams').value) || 0;
        const container = document.getElementById('captainsContainer');
        container.innerHTML = '';
        for (let i = 1; i <= n; i++) {
            container.innerHTML += `
                <div class="captain-input">
                    <input type="text" class="cap-name" placeholder="Nome do Capitão ${i}">
                </div>`;
        }
    }

    window.onload = gerarCamposCapitaes;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Função auxiliar para formatar nome + tag de nível no resultado
    function formatPlayer(name, levelInfo) {
        return `${name} <span class="level-tag">(${levelInfo})</span>`;
    }

    function sortear() {
        const nTeams = parseInt(document.getElementById('numTeams').value);
        const pTeam = parseInt(document.getElementById('perTeam').value);
        const capInputs = document.querySelectorAll('.cap-name');
        let captains = Array.from(capInputs).map(input => input.value.trim()).filter(n => n !== "");
        
        // Coletando listas e formatando com a tag de nível
        let m1 = document.getElementById('m1').value.split('\n').filter(n => n.trim() !== "").map(n => formatPlayer(n, "H1"));
        let m2 = document.getElementById('m2').value.split('\n').filter(n => n.trim() !== "").map(n => formatPlayer(n, "H2"));
        let m3 = document.getElementById('m3').value.split('\n').filter(n => n.trim() !== "").map(n => formatPlayer(n, "H3"));
        
        let f1 = document.getElementById('f1').value.split('\n').filter(n => n.trim() !== "").map(n => formatPlayer(n, "M1"));
        let f2 = document.getElementById('f2').value.split('\n').filter(n => n.trim() !== "").map(n => formatPlayer(n, "M2"));
        let f3 = document.getElementById('f3').value.split('\n').filter(n => n.trim() !== "").map(n => formatPlayer(n, "M3"));

        if (captains.length < nTeams) {
            alert(`Preencha os ${nTeams} capitães!`);
            return;
        }

        const totalPlayers = m1.length + m2.length + m3.length + f1.length + f2.length + f3.length;
        const faltam = (nTeams * pTeam) - nTeams; // Vagas restantes tirando os capitães
        
        if (totalPlayers < faltam) {
            alert(`Faltam ${faltam - totalPlayers} jogadores no total para preencher as equipes.`);
            return;
        }

        // Embaralha cada lista separadamente
        m1 = shuffle(m1); m2 = shuffle(m2); m3 = shuffle(m3);
        f1 = shuffle(f1); f2 = shuffle(f2); f3 = shuffle(f3);

        let teams = captains.map(cap => [cap + " <span class='captain-tag'>CAP</span>"]);

        // Ordem de prioridade para intercalar o sorteio (garante equilíbrio de gênero e nível)
        // Mulher N1 -> Homem N1 -> Mulher N2 -> Homem N2 -> Mulher N3 -> Homem N3
        let pools = [f1, m1, f2, m2, f3, m3];

        // i representa a rodada de escolha (para preencher o resto do time)
        for (let i = 1; i < pTeam; i++) {
            // Qual a lista preferencial desta rodada?
            let preferredPoolIndex = (i - 1) % pools.length;
            
            for (let t = 0; t < nTeams; t++) {
                let pick = null;
                
                // Tenta puxar da lista ideal. Se estiver vazia, tenta a próxima lista disponível.
                for (let offset = 0; offset < pools.length; offset++) {
                    let idx = (preferredPoolIndex + offset) % pools.length;
                    if (pools[idx].length > 0) {
                        pick = pools[idx].pop();
                        break;
                    }
                }
                
                if (pick) teams[t].push(pick);
            }
        }

        document.getElementById('teamList').innerHTML = teams.map((t, i) => 
            `<div class="team"><strong>Time ${i+1}</strong>` + 
            t.map(p => `<div class="player-item">• ${p}</div>`).join('') + 
            `</div>`).join('');
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function voltar() {
        document.getElementById('setup').style.display = 'block';
        document.getElementById('results').style.display = 'none';
    }
</script>
</body>
</html>
